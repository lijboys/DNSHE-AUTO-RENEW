name: DNSHE 域名批量自动续期

on:
  schedule:
    # 💡 定时触发器：每个月的 1 号 UTC 时间 2 点（北京时间上午 10 点）执行一次
    - cron: '0 2 1 * *'
  workflow_dispatch: # 允许你在 GitHub 网页端的 Actions 页面手动点击运行

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: 安装依赖
        run: pip install requests

      - name: 运行批量续期脚本
        env:
          # 💡 这里读取 GitHub Secrets 并传给 Python 脚本
          # DNSHE 基础密钥 (必填)
          API_KEY: ${{ secrets.API_KEY }}
          API_SECRET: ${{ secrets.API_SECRET }}
          
          # Telegram 通知配置 (选填)
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          
          # 微信通知配置 (选填，直接传入包含密码的完整 URL)
          WX_PUSH_URL: ${{ secrets.WX_PUSH_URL }}
        run: python renew.py
